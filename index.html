<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peak Doc</title>
  <meta name="description" content="Peak Doc">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:   #0d1b2a;
      --navy2:  #162233;
      --bone:   #e8e0d0;
      --bone2:  #c9bfa8;
      --gold:   #c9a84c;
      --gold2:  #a8863a;
      --dim:    rgba(232,224,208,0.45);
      --dimmer: rgba(232,224,208,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      min-height: 100vh;
      background-color: var(--navy);
      color: var(--bone);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Starfield canvas ── */
    #stars {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── Mountain silhouette ── */
    .mountains {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 70vh;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
    }

    /* ── Page layout ── */
    .page {
      position: relative; z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    header {
      padding: 2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-transform: uppercase;
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    nav a {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.25s;
    }

    nav a:hover { color: var(--bone); }

    .nav-enter {
      border: 0.5px solid var(--gold2);
      color: var(--gold) !important;
      padding: 0.45rem 1.1rem;
      border-radius: 2px;
      transition: background 0.25s, color 0.25s !important;
    }
    .nav-enter:hover {
      background: var(--gold);
      color: var(--navy) !important;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 2.5rem 8rem;
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.3s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: 0.04em;
      color: var(--bone);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.5s forwards;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .cross {
      display: flex;
      align-items: center;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .cross svg {
      width: clamp(16px, 2.5vw, 28px);
      height: clamp(16px, 2.5vw, 28px);
    }

    .descriptor {
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 2;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.7s forwards;
    }

    .descriptor span {
      margin: 0 0.6rem;
      color: var(--gold);
      opacity: 0.5;
    }

    .bio {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.18rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--bone2);
      max-width: 540px;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.9s 0.9s forwards;
    }

    /* ── Coming soon pills ── */
    .coming-soon {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.9s 1.1s forwards;
    }

    .pill {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border: 0.5px solid var(--dimmer);
      border-radius: 2px;
      color: var(--dimmer);
      position: relative;
      overflow: hidden;
    }

    .pill::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--gold);
      opacity: 0.4;
    }

    /* ── CTA ── */
    .cta-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      opacity: 0;
      animation: fadeUp 0.9s 1.3s forwards;
    }

    .btn-primary {
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      display: inline-block;
    }
    .btn-primary:hover { background: var(--bone); transform: translateY(-1px); }

    .btn-ghost {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      border-bottom: 0.5px solid var(--dimmer);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--bone); border-color: var(--bone2); }

    /* ── Elevation tag ── */
    .elevation-tag {
      position: fixed;
      bottom: 2.5rem;
      right: 2.5rem;
      z-index: 10;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dimmer);
      writing-mode: vertical-rl;
      opacity: 0;
      animation: fadeIn 1.2s 1.8s forwards;
    }

    /* ── Password modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(13,27,42,0.92);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--navy2);
      border: 0.5px solid rgba(201,168,76,0.25);
      border-radius: 3px;
      padding: 2.5rem 2.5rem 2rem;
      width: min(420px, 90vw);
      animation: fadeUp 0.35s forwards;
    }

    .modal h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--bone);
      margin-bottom: 0.4rem;
    }
    .modal p {
      font-size: 0.78rem;
      color: var(--dim);
      margin-bottom: 1.8rem;
      letter-spacing: 0.04em;
    }

    .modal input[type="password"] {
      width: 100%;
      background: rgba(232,224,208,0.06);
      border: 0.5px solid rgba(232,224,208,0.2);
      border-radius: 2px;
      padding: 0.75rem 1rem;
      color: var(--bone);
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal input:focus { border-color: var(--gold); }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .modal-error {
      font-size: 0.72rem;
      color: #c0715a;
      letter-spacing: 0.06em;
      min-height: 1rem;
      margin-bottom: 0.5rem;
    }

    .btn-close-modal {
      font-size: 0.72rem;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Jost', sans-serif;
    }
    .btn-close-modal:hover { color: var(--bone); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 1.5rem; }
      .hero { padding: 0 1.5rem 10rem; }
      nav { gap: 1.2rem; }
      .elevation-tag { display: none; }
    }
  </style>
</head>

<!-- Password Modal -->
<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <h2 id="modal-title">Enter passphrase</h2>
    <p>This area is currently private.</p>
    <input type="password" id="pw-input" placeholder="••••••••" autocomplete="current-password">
    <div class="modal-error" id="pw-error" role="alert"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="checkPassword()" style="padding:0.65rem 1.5rem;">Enter</button>
      <button class="btn-close-modal" onclick="closeModal()">Cancel</button>
    </div>
  </div>

<!-- Page -->
<div class="page">
  <header>
    <a class="wordmark" href="/">Peak Doc</a>
    <nav>
      <a href="#" onclick="openModal(); return false;" class="nav-enter">Enter Site</a>
    </nav>
  </header>

  <main class="hero">
    <h1>
      <span class="cross" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="2" width="4" height="24" rx="1" fill="#c0392b"/>
          <rect x="2" y="12" width="24" height="4" rx="1" fill="#c0392b"/>
        </svg>
      </span>
      Peak&nbsp;Doc
      <span class="cross" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="2" width="4" height="24" rx="1" fill="#c0392b"/>
          <rect x="2" y="12" width="24" height="4" rx="1" fill="#c0392b"/>
        </svg>
      </span>

    </div>

</div>



<script>
  // ── Starfield ──
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length: 180}, () => ({
    x: Math.random(),
    y: Math.random() * 0.75,
    r: Math.random() * 1.1 + 0.2,
    a: Math.random() * 0.7 + 0.15,
    speed: Math.random() * 0.0003 + 0.0001,
    phase: Math.random() * Math.PI * 2
  }));

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const flicker = s.a + Math.sin(t * s.speed * 1000 + s.phase) * 0.15;
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232,224,208,${Math.max(0, Math.min(1, flicker))})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);

  // ── Password gate ──
  // Change this to whatever password you want
  const SITE_PASSWORD = "rockies2025";

  function openModal() {
    document.getElementById('modal').classList.add('open');
    document.getElementById('pw-input').focus();
    document.getElementById('pw-error').textContent = '';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
  }

  function checkPassword() {
    const val = document.getElementById('pw-input').value;
    if (val === SITE_PASSWORD) {
      // Store session so inner pages don't re-prompt
      sessionStorage.setItem('peakdoc_auth', 'true');
      // Redirect to interior — update this path when your interior page is ready
      window.location.href = '/interior.html';
    } else {
      document.getElementById('pw-error').textContent = 'Incorrect passphrase.';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  // Allow Enter key in password field
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
</script>
