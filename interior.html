<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeakDoc — Interior</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d1b2a; --navy2: #162233;
      --bone: #e8e0d0; --bone2: #c9bfa8;
      --gold: #c9a84c; --dim: rgba(232,224,208,0.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: var(--navy); color: var(--bone);
      font-family: 'Jost', sans-serif; font-weight: 300;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 2rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-size: 3rem;
      font-weight: 300; color: var(--bone); margin-bottom: 1rem;
    }
    p { color: var(--dim); font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2rem; }
    a {
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold); text-decoration: none; border-bottom: 0.5px solid rgba(201,168,76,0.4);
      padding-bottom: 2px;
    }
  </style>
  <script>
    // Guard: if not authenticated, send back to landing page
    if (sessionStorage.getItem('peakdoc_auth') !== 'true') {
      window.location.replace('/');
    }
  </script>
</head>
<body>
  <h1>Coming soon.</h1>
  <p>This is where the good stuff goes.</p>
  <a href="/">← Back to landing</a>
</body>
</html>
